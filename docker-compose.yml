services:
  pln-rag:
    build: .
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PARSER=${PARSER:-nl2pln}
      - QDRANT_URL=http://qdrant:6333
      # Note: Points to Ollama on your host machine
      - OLLAMA_URL=http://host.docker.internal:11434/api/embeddings
      - ATOMSPACE_PATH=/app/data/atomspace/kb.metta
      - FAISS_PATH=/app/data/faiss
    volumes:
      - pln_data:/app/data
      - ./simba_all.json:/app/data/simba_all.json
      - ./data/simba_canonical_pln.json:/app/data/simba_canonical_pln.json
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - qdrant  # Simple dependency, no healthcheck needed
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

volumes:
  pln_data:
  qdrant_data:
